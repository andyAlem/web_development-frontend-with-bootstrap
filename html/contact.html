<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Контакты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .letter-v {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            background: white;
            color: #495057;
            font-weight: bold;
            border-radius: 5px;
        }
        .sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
        }
        .main-content {
            margin-left: 280px;
        }
        @media (max-width: 992px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body class="bg-light">
    <!-- Сайдбар -->
    <nav class="sidebar bg-dark text-white p-3">
        <div class="d-flex flex-column h-100">
            <div class="mb-4">
                <h5 class="d-flex align-items-center mb-0">
                    <span class="letter-v me-2">В</span>
                    <span>Меню</span>
                </h5>
            </div>

            <nav class="nav flex-column mb-auto">
                <a class="nav-link text-white" href="index.html">
                    Главная
                </a>
                <a class="nav-link text-white" href="category.html">
                    Категории
                </a>
                <a class="nav-link text-white" href="catalog.html">
                    Каталог
                </a>
                <a class="nav-link text-white active bg-primary" href="contact.html">
                    Контакты
                </a>
            </nav>

            <div class="dropdown mt-auto">
                <button class="btn btn-secondary dropdown-toggle w-100" type="button" data-bs-toggle="dropdown">
                    Пользователь
                </button>
                <ul class="dropdown-menu w-100">
                    <li><a class="dropdown-item" href="#">Профиль</a></li>
                    <li><a class="dropdown-item" href="#">Выход</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Основное содержимое -->
    <main class="main-content p-4">
        <div class="container-fluid">
            <h1 class="mb-4">Контакты</h1>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="card shadow">
                        <div class="card-body">
                            <h3 class="card-title mb-4">Наши контакты</h3>
                            <ul class="list-unstyled">
                                <li class="mb-3">
                                    <h5><i class="bi bi-geo-alt-fill me-2"></i> Адрес</h5>
                                    <p>г. Воронеж, ул. Тестовая, д. 7</p>
                                </li>
                                <li class="mb-3">
                                    <h5><i class="bi bi-telephone-fill me-2"></i> Телефон</h5>
                                    <p>+7 (007) 111-22-33</p>
                                </li>
                                <li class="mb-3">
                                    <h5><i class="bi bi-envelope-fill me-2"></i> Email</h5>
                                    <p>info@example.com</p>
                                </li>
                                <li>
                                    <h5><i class="bi bi-clock-fill me-2"></i> Часы работы</h5>
                                    <p>Пн-Пт: 9:00 - 18:00</p>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card shadow">
                        <div class="card-body">
                            <h3 class="card-title mb-4">Обратная связь</h3>
                            <form>
                                <div class="mb-3">
                                    <label for="name" class="form-label">Ваше имя</label>
                                    <input type="text" class="form-control" id="name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="mb-3">
                                    <label for="message" class="form-label">Сообщение</label>
                                    <textarea class="form-control" id="message" rows="4" required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary">Отправить</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
